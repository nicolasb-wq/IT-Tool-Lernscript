# Produktions-Verbund: App + PostgreSQL + Caddy (automatisches HTTPS).
# Konfiguration über .env — Vorlage: .env.production.example
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://lernscript:${POSTGRES_PASSWORD}@db:5432/lernscript
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      INVITE_CODE: ${INVITE_CODE}
      FREE_GENERATIONS: ${FREE_GENERATIONS:-3}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      SESSION_HTTPS_ONLY: "1"
    depends_on:
      db:
        condition: service_healthy
    # Kein ports-Mapping: Die App ist nur intern über Caddy erreichbar.

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lernscript
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lernscript
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lernscript -d lernscript"]
      interval: 5s
      timeout: 3s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # Let's-Encrypt-Zertifikate (persistent!)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:
