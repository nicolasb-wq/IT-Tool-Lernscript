<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrieren – Lernscript-Generator</title>
<style>
  :root { --blue:#0071B2; --light:#D2E8F4; --orange:#FE5000; }
  body { font-family: 'Source Sans Pro','Segoe UI',sans-serif; margin:0; background:var(--light); color:#161616; }
  header { background:var(--blue); color:#fff; padding:1.2rem 2rem; }
  main { max-width:420px; margin:3rem auto; background:#fff; padding:2rem; border-radius:8px;
         box-shadow:0 2px 8px rgba(0,0,0,.08); }
  label { display:block; font-weight:600; margin:1rem 0 .3rem; }
  input { width:100%; padding:.55rem; border:1px solid #B8CDDD; border-radius:5px; box-sizing:border-box; }
  button { margin-top:1.5rem; width:100%; background:var(--orange); color:#fff; border:0; padding:.8rem;
           font-size:1rem; font-weight:700; border-radius:5px; cursor:pointer; }
  .error { background:#FDEAE2; border-left:3px solid var(--orange); padding:.6rem .8rem; margin-top:1rem; }
  .hint { font-size:.85rem; color:#666; margin-top:.25rem; }
  .alt { margin-top:1.2rem; font-size:.9rem; }
</style>
</head>
<body>
<header><h1>Lernscript-Generator</h1></header>
<main>
  <h2>Registrieren</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <label>E-Mail</label>
    <input type="email" name="email" required autofocus>
    <label>Passwort</label>
    <input type="password" name="password" required minlength="8">
    <div class="hint">Mindestens 8 Zeichen.</div>
    <label>Invite-Code</label>
    <input type="text" name="invite_code" required>
    <div class="hint">Registrierung nur mit gültigem Einladungscode.</div>
    <button type="submit">Konto erstellen</button>
  </form>
  <div class="alt">Schon registriert? <a href="/login">Zur Anmeldung</a></div>

  <p style="margin-top:1.5rem;font-size:.8rem;color:#888;"><a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a></p>
</main>
</body>
</html>
